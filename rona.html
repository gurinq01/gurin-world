<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のロナメッセージ — GURiN World</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; min-height: 100vh; padding: 1.5rem; }
.wrap { max-width: 480px; margin: 0 auto; }

/* 作法画面 */
#intro { text-align: center; padding: 1rem 0; }
.rona-img { width: 100%; max-width: 360px; border-radius: 16px; margin: 0 auto 1.5rem; display: block; }
.gw-label { font-size: 11px; letter-spacing: 0.15em; color: #00C8C8; text-transform: uppercase; margin-bottom: 0.5rem; }
.gw-heading { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 1.5rem; }
.saho-box { background: #0f0f1a; border: 0.5px solid #1a1a2a; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: left; }
.saho-box p { font-size: 14px; color: #888; line-height: 2; }
.start-btn { background: transparent; border: 1px solid #00C8C8; border-radius: 10px; padding: 14px 24px; color: #00C8C8; font-size: 15px; cursor: pointer; width: 100%; font-family: inherit; transition: background 0.2s; }
.start-btn:hover { background: rgba(0,200,200,0.1); }

/* メッセージ画面 */
#message-screen { display: none; }
.gw-sub { font-size: 13px; color: #555; margin-bottom: 2rem; }
.card { background: #0f0f1a; border: 0.5px solid #00C8C8; border-radius: 16px; padding: 2rem; margin-bottom: 1.25rem; text-align: center; }
.kanji { font-size: 72px; font-weight: 500; color: #00C8C8; margin-bottom: 1rem; line-height: 1; }
.date-label { font-size: 11px; color: #444; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
.message { font-size: 16px; color: #ccc; line-height: 1.9; text-align: left; }
.message::before { content: "🐱  "; }
.divider { height: 0.5px; background: #1a1a2a; margin: 1.5rem 0; }
.note { font-size: 12px; color: #333; line-height: 1.7; }
.btn { background: transparent; border: 0.5px solid #1a1a2a; border-radius: 10px; padding: 12px; color: #555; font-size: 13px; cursor: pointer; width: 100%; margin-bottom: 0.75rem; transition: border-color 0.2s, color 0.2s; font-family: inherit; }
.btn:hover { border-color: #00C8C8; color: #00C8C8; }
.back-btn { background: transparent; border: none; color: #333; font-size: 12px; cursor: pointer; width: 100%; padding: 8px; font-family: inherit; }
.back-btn:hover { color: #555; }
.footer { text-align: center; font-size: 11px; color: #222; margin-top: 1rem; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 作法画面 -->
  <div id="intro">
    <img src="rona_message.png" alt="ロナ" class="rona-img">
    <div class="gw-label">GURiN World</div>
    <div class="gw-heading">今日のロナメッセージ</div>
    <div class="saho-box">
      <p>
        まず、一呼吸おいて。<br><br>
        今日の自分に問いかけてみよう。<br><br>
        「今、何を感じているか？」<br><br>
        準備ができたら、メッセージを受け取ってください。<br>
        これが今日のあなたへの言葉です。
      </p>
    </div>
    <button class="start-btn" onclick="showMessage()">メッセージを受け取る</button>
  </div>

  <!-- メッセージ画面 -->
  <div id="message-screen">
    <div class="gw-label">GURiN World</div>
    <div class="gw-heading">今日のロナメッセージ</div>
    <div class="gw-sub">日付が変わるたびに、新しい言葉が届く。</div>

    <div class="card">
      <div class="kanji" id="kanji"></div>
      <div class="date-label" id="date-label"></div>
      <div class="message" id="message"></div>
      <div class="divider"></div>
      <div class="note">世界観が変わると、世界が変わる。</div>
    </div>

    <button class="btn" onclick="showRandom()">別のメッセージを引く</button>
    <button class="btn" onclick="showToday()">今日のメッセージに戻る</button>
    <button class="back-btn" onclick="showIntro()">← 作法画面に戻る</button>
    <div class="footer">GURiN World © 2026 @GURIN_Q01</div>
  </div>

</div>

<script>
const messages = [
  { kanji: "集", text: "今現れている出来事に意識を集中せよ。そこが今解く進化のカギ" },
  { kanji: "矛", text: "矛盾があっても突き進め！自ら（宇宙）を信じよ" },
  { kanji: "盾", text: "盾とは心のシールド。内なる光に合わせ続けよ" },
  { kanji: "遊", text: "5歳の心と500歳の心で遊ぶ。遊ぶとは天と共にあること" },
  { kanji: "瞬", text: "この瞬間が最高！と創造せよ。今がベストだと思うことで世界が開かれる" },
  { kanji: "安", text: "将来の心配、過去の事、何事も安心されたし。信じられよ" },
  { kanji: "笑", text: "笑いは空間が融ける、謎も解ける、まずはわけなく心にほほえみを" },
  { kanji: "不", text: "不満不足不備は創造力の源泉。不足を面白がれ！自己の拡張となる" },
  { kanji: "嫌", text: "嫌な人・事をよく観察してみる。あなたが拡張する宝あり" },
  { kanji: "責", text: "自分を責めることも相手を責めることなく、自らの意識を見つめよ" },
  { kanji: "聞", text: "聞かなくていいことは止める力、遮断する力。内なる心に耳を傾けよ" },
  { kanji: "関", text: "人間の関心ごとと宇宙の関心事は違う。天に合わせよ" },
  { kanji: "停", text: "時には自ら一時停止してみる。大きく飛翔するために" },
  { kanji: "東", text: "東門は難問を解く、尋ねてみよ。生命の活力を得る" },
  { kanji: "緑", text: "魂休まる安らかな色。すべてひとつと感じ、生命輝き風が通る色" },
  { kanji: "過", text: "過去は今の中にある　過去を憂う時過去の意識となる　切り替えよ" },
  { kanji: "希", text: "希望とは黄金の珠を胸に持ち、他に輝く夢を投げる光" },
  { kanji: "未", text: "未来の記憶を思い出す。ここは追想の世界。心澄まし感じてみる" },
  { kanji: "素", text: "直感の質を上げるには、素直な心を宝とし、透明な心で受け取るが鍵" },
  { kanji: "静", text: "静かな心があれば、色鮮やか世界を創造できる" },
  { kanji: "望", text: "望み　願い　任せよ　急ぐな　安心せよ" },
  { kanji: "夢", text: "夢幻（ゆめまぼろし）を友とせよ。世界の果ても同じ世なり" },
  { kanji: "叶", text: "見失ってはならぬもの、夢叶うと決めた心" },
  { kanji: "全", text: "全天候型の思考でいく。雨も曇りも晴れも全てよし！" },
  { kanji: "事", text: "事始めれば時（意識）を得る" },
  { kanji: "愛", text: "愛とはつゆほどもなく信じること" },
  { kanji: "救", text: "救うは魂のめざめ。我が心を救うこと、それがすべてにつながる" },
  { kanji: "悩", text: "悩むな、感じよ。思考を変えよ" },
  { kanji: "風", text: "春風、突風、向かい風。全ての風を使うその心を持つ" },
  { kanji: "幸", text: "幸福なること形にあらず" },
  { kanji: "誓", text: "自分に誓うな、我に誓え" },
  { kanji: "脱", text: "古き常識、価値観、役割を脱ぎ、自らの世界を歩め" },
  { kanji: "呼", text: "一息ごとに空（くう）を呼ぶ。宇宙とのつながりを思い出す時間" },
];

function showToday() {
  const now0 = new Date();
  const start = new Date(now0.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now0 - start) / 86400000);
  const idx = dayOfYear % messages.length;
  const m = messages[idx];
  document.getElementById('kanji').textContent = m.kanji;
  document.getElementById('message').textContent = m.text;
  const now = new Date();
  document.getElementById('date-label').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日のメッセージ';
}

/* 山札方式：一巡の中では同じメッセージが重複しない。
   32個すべて出たら再シャッフル。山札はブラウザに保存され、日をまたいでも続く */
function loadBag() {
  try {
    const saved = JSON.parse(localStorage.getItem('ronaBag'));
    if (Array.isArray(saved) && saved.length > 0 &&
        saved.every(n => Number.isInteger(n) && n >= 0 && n < messages.length)) {
      return saved;
    }
  } catch (e) {}
  return newBag();
}

function newBag() {
  const bag = [...Array(messages.length).keys()];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  return bag;
}

function showRandom() {
  let bag = loadBag();
  const idx = bag.pop();
  if (bag.length === 0) bag = newBag();
  try { localStorage.setItem('ronaBag', JSON.stringify(bag)); } catch (e) {}
  const m = messages[idx];
  document.getElementById('kanji').textContent = m.kanji;
  document.getElementById('message').textContent = m.text;
  document.getElementById('date-label').textContent = 'No.' + (idx+1) + '　' + m.kanji;
}

function showMessage() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('message-screen').style.display = 'block';
  showToday();
}

function showIntro() {
  document.getElementById('intro').style.display = 'block';
  document.getElementById('message-screen').style.display = 'none';
}
</script>
</body>
</html>
